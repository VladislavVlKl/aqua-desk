<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1d; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; padding: 20px; width: 100%; }
        .btn { display: none; margin-top: 20px; padding: 15px; background: #2481cc; color: white; border: none; border-radius: 12px; width: 80%; font-weight: bold; }
        #debug { font-size: 11px; color: #555; margin-top: 30px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="status">Загрузка...</h2>
    <p id="user-info"></p>
    <center><button id="main-btn" class="btn">НАЧАТЬ РАБОТУ</button></center>
    <div id="debug"></div>
</div>

<script>
    // Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const SUPABASE_URL = 'https://nkwfvuhtpaoxsaczwsrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd2Z2dWh0cGFveHNhY3p3c3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUwMzIsImV4cCI6MjA5MzcxMTAzMn0.a2rKoLNBB4OGpuENu1XUhsfbc-8JmPbxEkvLrXqUM3A';
    
    // Создаем клиент
    const supabase = supabase.createClient(https://nkwfvuhtpaoxsaczwsrg.supabase.co/rest/v1/, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd2Z2dWh0cGFveHNhY3p3c3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUwMzIsImV4cCI6MjA5MzcxMTAzMn0.a2rKoLNBB4OGpuENu1XUhsfbc-8JmPbxEkvLrXqUM3A);

    async function auth() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const user = tg.initDataUnsafe.user;

        if (!user) {
            status.innerText = "Ошибка: Запустите через бота";
            return;
        }

        debug.innerText = "Подключение к базе... (ID: " + user.id + ")";

        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle();

            if (error) {
                status.innerText = "Ошибка базы данных";
                debug.innerText = error.message;
                return;
            }

            if (data) {
                status.innerText = "Доступ открыт";
                document.getElementById('user-info').innerText = "Аккаунт: " + data.full_name + " [" + data.role + "]";
                document.getElementById('main-btn').style.display = "block";
                debug.innerText = "Всё отлично!";
            } else {
                status.innerText = "Доступ ограничен";
                document.getElementById('user-info').innerText = "Вашего ID (" + user.id + ") нет в списке разрешенных.";
                debug.innerText = "Обратитесь к администратору";
            }
        } catch (e) {
            status.innerText = "Сбой системы";
            debug.innerText = e.message;
        }
    }

    // Запускаем через небольшую паузу, чтобы библиотеки успели загрузиться
    setTimeout(auth, 500);
</script>
</body>
</html>
