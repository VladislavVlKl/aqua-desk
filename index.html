<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .card { padding: 20px; width: 80%; }
        .loader { color: var(--hint); font-size: 14px; }
        .error { color: #e53935; }
        .welcome-msg { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .role-tag { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .main-button {
            margin-top: 25px;
            padding: 12px 24px;
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            display: none; /* Покажется только после проверки */
            width: 100%;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="loader">Инициализация...</div>
    <div id="content" style="display: none;">
        <div class="role-tag" id="user-role"></div>
        <div class="welcome-msg" id="user-name"></div>
        <button id="main-btn" class="main-button">Начать работу</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Ваши данные Supabase
    const SUPABASE_URL = 'https://nkwfvuhtpaoxsaczwsrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd2Z2dWh0cGFveHNhY3p3c3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUwMzIsImV4cCI6MjA5MzcxMTAzMn0.a2rKoLNBB4OGpuENu1XUhsfbc-8JmPbxEkvLrXqUM3A';
    
    const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function authorize() {
        const status = document.getElementById('status');
        const content = document.getElementById('content');
        
        // 1. Проверяем, запущен ли код в Telegram
        const userId = tg.initDataUnsafe.user?.id;

        if (!userId) {
            status.innerHTML = '<span class="error">Пожалуйста, откройте приложение из Telegram</span>';
            return;
        }

        try {
            // 2. Ищем пользователя в таблице profiles
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();

            if (error || !profile) {
                status.innerHTML = '<span class="error">Доступ закрыт.<br>Ваш ID (' + userId + ') не найден в системе.</span>';
            } else {
                // 3. Если нашли — показываем интерфейс
                status.style.display = 'none';
                content.style.display = 'block';
                document.getElementById('user-role').innerText = profile.role === 'admin' ? 'Администратор' : 'Тренер';
                document.getElementById('user-name').innerText = 'Привет, ' + (profile.full_name || 'друг') + '!';
                document.getElementById('main-btn').style.display = 'block';
            }
        } catch (e) {
            status.innerText = 'Ошибка связи с базой данных';
        }
    }

    authorize();
</script>

</body>
</html>
