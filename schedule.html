<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание — AquaDesk</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:     #0f0f1a;
      --bg2:    #1a1a2e;
      --text:   #eaeaea;
      --hint:   #888;
      --accent: #7c3aed;
      --success:#10b981;
      --border: rgba(255,255,255,0.08);
      --card:   rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100dvh; }

    .header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; color: var(--hint); margin-top: 2px; }
    .branch-badge {
      display: inline-block; background: rgba(124,58,237,.25); color: #a78bfa;
      border: 1px solid rgba(124,58,237,.4); border-radius: 20px;
      padding: 3px 10px; font-size: 12px; font-weight: 600; margin-top: 4px;
    }

    .controls {
      padding: 10px 16px; display: flex; gap: 10px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: var(--bg2);
    }
    .controls select {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 8px 12px; font-size: 13px; outline: none;
      font-family: inherit;
    }

    .legend {
      padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .legend-item { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .leg-pt    { background: rgba(124,58,237,.2);  color: #a78bfa; }
    .leg-group { background: rgba(16,185,129,.2);  color: #10b981; }
    .leg-duty  { background: rgba(120,120,120,.2); color: #999;    }

    .scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table { border-collapse: collapse; width: max-content; min-width: 100%; }
    th {
      background: var(--bg2); padding: 10px 8px; font-size: 12px;
      font-weight: 600; color: var(--hint); text-align: center;
      position: sticky; top: 0; z-index: 2; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .time-col { width: 48px; position: sticky; left: 0; z-index: 3; background: var(--bg2); }
    td { padding: 3px 4px; min-width: 100px; vertical-align: top;
         border-bottom: 1px solid rgba(255,255,255,.03); }
    td.time-cell {
      font-size: 11px; color: var(--hint); text-align: right; padding: 5px 8px;
      white-space: nowrap; font-variant-numeric: tabular-nums;
      position: sticky; left: 0; background: var(--bg2); z-index: 1;
      border-right: 1px solid var(--border);
    }

    .slot {
      font-size: 11px; font-weight: 600; padding: 4px 6px; border-radius: 5px;
      margin-bottom: 3px; line-height: 1.35;
    }
    .slot-pt       { background: rgba(124,58,237,.18); color: #a78bfa; border-left: 3px solid #7c3aed; }
    .slot-group    { background: rgba(16,185,129,.15);  color: #10b981; border-left: 3px solid #10b981; }
    .slot-group-susha { background: rgba(234,179,8,.18);  color: #ca8a04; border-left: 3px solid #eab308; }
    .slot-group-voda  { background: rgba(59,130,246,.18); color: #3b82f6; border-left: 3px solid #3b82f6; }
    .slot-group-both  { background: rgba(124,58,237,.1);  color: #a78bfa; border-left: 3px solid #eab308; border-right: 3px solid #3b82f6; }
    .slot-duty  { background: rgba(120,120,120,.15); color: #999; border-left: 3px solid #888; }
    .slot-name  { font-weight: 700; }
    .slot-sub   { font-weight: 400; opacity: .8; font-size: 10px; margin-top: 1px; }

    .spinner { width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;margin:60px auto; }
    @keyframes spin{to{transform:rotate(360deg)}}

    .updated { font-size: 11px; color: var(--hint); padding: 10px 16px; text-align: center; }
    .readonly-note {
      font-size: 11px; color: var(--hint); text-align: center;
      padding: 6px; background: rgba(255,255,255,.03);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      th, td { min-width: 70px; }
      .slot { font-size: 10px; padding: 3px 4px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🏊 Расписание AquaDesk</h1>
      <div id="branch-badge"></div>
      <p id="sub-title">Загрузка...</p>
    </div>
  </div>

  <div class="controls" id="controls-bar">
    <select id="branch-filter" onchange="render()">
      <option value="">Все филиалы</option>
    </select>
    <select id="type-filter" onchange="render()">
      <option value="">Все типы</option>
      <option value="pt">Только ПТ</option>
      <option value="group">Только группы</option>
    </select>
  </div>

  <div class="legend">
    <span class="legend-item leg-pt">ПТ (персональные)</span>
    <span class="legend-item leg-group">Групповые</span>
    <span class="legend-item leg-duty" id="duty-legend" style="display:none">Дежурства</span>
  </div>

  <div id="content"><div class="spinner"></div></div>
  <div class="updated" id="updated-at"></div>
  <div class="readonly-note">🔒 Только просмотр</div>

  <script>
    const SUPABASE_URL      = 'https://nkwfvuhtpaoxsaczwsrg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rd2Z2dWh0cGFveHNhY3p3c3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUwMzIsImV4cCI6MjA5MzcxMTAzMn0.a2rKoLNBB4OGpuENu1XUhsfbc-8JmPbxEkvLrXqUM3A';
    const DAYS  = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const HOURS = Array.from({length:17},(_,i)=>`${String(i+7).padStart(2,'0')}:00`);

    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allSlots  = [];
    let allDuties = [];

    // Читаем branch из URL-параметра (?branch=ChekovLight)
    const urlBranch = new URLSearchParams(location.search).get('branch') || '';

    // Если branch зафиксирован — скрываем селектор и показываем бейдж
    if (urlBranch) {
      document.getElementById('controls-bar').style.display = 'none';
      document.getElementById('duty-legend').style.display = '';
    }

    function getActiveBranch() {
      return urlBranch || document.getElementById('branch-filter')?.value || '';
    }

    async function load() {
      const [{ data, error }, { data: tgData }] = await Promise.all([
        _sb.from('schedule_slots')
          .select('*, profiles!trainer_id(fio), group_types(name)')
          .eq('active', true)
          .in('slot_type', ['pt','group'])
          .order('day_of_week').order('start_time'),
        _sb.from('trainer_groups')
          .select('trainer_id, group_type_id, role')
          .is('subscription_end', null),
      ]);

      if (error) {
        document.getElementById('content').innerHTML =
          '<p style="color:#ef4444;text-align:center;padding:40px">Ошибка загрузки</p>';
        return;
      }
      // Строим карту: trainerId_groupTypeId → role
      window._trainerRoleMap = {};
      (tgData||[]).forEach(r => {
        if (r.role) window._trainerRoleMap[`${r.trainer_id}_${r.group_type_id}`] = r.role;
      });
      allSlots = data || [];

      // Дежурства текущей недели
      const now = new Date();
      const mon = new Date(now);
      mon.setDate(now.getDate() - (now.getDay()+6)%7);
      mon.setHours(0,0,0,0);
      const sun = new Date(mon); sun.setDate(mon.getDate()+7);
      const { data: duties } = await _sb.from('duties')
        .select('*, profiles(fio)')
        .gte('start_time', mon.toISOString())
        .lt('start_time', sun.toISOString())
        .not('end_time','is',null);
      allDuties = duties || [];

      // Заполняем селектор филиалов (только если нет URL-параметра)
      if (!urlBranch) {
        const branches = [...new Set(allSlots.map(s=>s.branch).filter(Boolean))].sort();
        const bf = document.getElementById('branch-filter');
        if (bf && bf.options.length <= 1) {
          branches.forEach(b => {
            const o = document.createElement('option');
            o.value = b; o.textContent = b;
            bf.appendChild(o);
          });
        }
      } else {
        // Показываем бейдж с названием филиала
        document.getElementById('branch-badge').innerHTML =
          `<span class="branch-badge">📍 ${decodeURIComponent(urlBranch)}</span>`;
        document.title = `Расписание — ${decodeURIComponent(urlBranch)}`;
      }

      document.getElementById('sub-title').textContent =
        `Обновлено: ${new Date().toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}`;

      render();
    }

    function render() {
      const branch = getActiveBranch();
      const type   = document.getElementById('type-filter')?.value || '';

      const dutyLegend = document.getElementById('duty-legend');
      if (dutyLegend) dutyLegend.style.display = branch ? '' : 'none';

      let slots = allSlots;
      if (branch) slots = slots.filter(s => s.branch === branch);
      if (type)   slots = slots.filter(s => s.slot_type === type);

      // Сетка слотов
      const grid = {};
      for (let d=0;d<7;d++) grid[d]={};
      slots.forEach(s => {
        const hKey = s.start_time.slice(0,2)+':00';
        if (!grid[s.day_of_week][hKey]) grid[s.day_of_week][hKey]=[];
        grid[s.day_of_week][hKey].push(s);
      });

      // Сетка дежурств
      const dutyGrid = {};
      for (let d=0;d<7;d++) dutyGrid[d]={};
      if (branch) {
        const mon = new Date();
        mon.setDate(mon.getDate()-(mon.getDay()+6)%7);
        mon.setHours(0,0,0,0);
        allDuties.filter(d=>d.branch===branch).forEach(duty=>{
          const dt = new Date(duty.start_time);
          const dow = (dt.getDay()+6)%7;
          const hKey = String(dt.getHours()).padStart(2,'0')+':00';
          if (!dutyGrid[dow][hKey]) dutyGrid[dow][hKey]=[];
          dutyGrid[dow][hKey].push(duty);
        });
      }

      const content = document.getElementById('content');
      if (!slots.length && !Object.values(dutyGrid).some(h=>Object.keys(h).length)) {
        content.innerHTML = '<p style="text-align:center;color:#888;padding:40px">Нет занятий</p>';
        return;
      }

      const activeHours = HOURS.filter(h =>
        [0,1,2,3,4,5,6].some(d => grid[d][h]?.length || dutyGrid[d][h]?.length)
      );

      const mon = new Date();
      mon.setDate(mon.getDate()-(mon.getDay()+6)%7);

      content.innerHTML = `
        <div class="scroll-wrap">
          <table>
            <thead><tr>
              <th class="time-col"></th>
              ${DAYS.map((d,i)=>{
                const dt=new Date(mon); dt.setDate(mon.getDate()+i);
                return `<th>${d}<br><span style="font-size:11px;font-weight:400;opacity:.6">${dt.getDate()}.${String(dt.getMonth()+1).padStart(2,'0')}</span></th>`;
              }).join('')}
            </tr></thead>
            <tbody>
              ${activeHours.map(h=>`
                <tr>
                  <td class="time-cell">${h}</td>
                  ${[0,1,2,3,4,5,6].map(dow=>{
                    const daySlots  = grid[dow][h]||[];
                    const dayDuties = dutyGrid[dow][h]||[];
                    const items = [
                      ...daySlots.map(s=>{
                        const isPt = s.slot_type==='pt';
                        const name = isPt
                          ? (s.profiles?.fio?.split(' ')[0]||'Тренер')+' · ПТ'
                          : (s.group_types?.name||'Группа');
                        const sub = isPt
                          ? s.start_time.slice(0,5)
                          : `${s.avg_headcount?s.avg_headcount+' чел. · ':''}${s.start_time.slice(0,5)}`;
                        let slotClass = `slot-${s.slot_type}`;
                        if (s.slot_type==='group') {
                          const role = (window._trainerRoleMap||{})[`${s.trainer_id}_${s.group_type_id}`]||'';
                          if (role==='суша') slotClass='slot-group-susha';
                          else if (role==='вода') slotClass='slot-group-voda';
                          else if (role==='суша+вода') slotClass='slot-group-both';
                        }
                        return `<div class="slot ${slotClass}"><div class="slot-name">${name}</div><div class="slot-sub">${sub}</div></div>`;
                      }),
                      ...dayDuties.map(d=>{
                        const start=new Date(d.start_time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
                        const end  =new Date(d.end_time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
                        return `<div class="slot slot-duty"><div class="slot-name">${d.profiles?.fio?.split(' ')[0]||'?'}</div><div class="slot-sub">Деж. ${start}–${end}</div></div>`;
                      }),
                    ];
                    return `<td>${items.join('')}</td>`;
                  }).join('')}
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    load();
    setInterval(load, 5*60*1000);
  </script>
</body>
</html>
